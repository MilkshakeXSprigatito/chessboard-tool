<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>專題棋盤 - 對角線提示版</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; 
            background: #f0f2f5; margin: 0; padding: 20px 10px;
            touch-action: manipulation;
        }
        .container { 
            background: white; padding: 20px; border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center;
            width: 100%; max-width: 95vw; box-sizing: border-box;
        }
        .controls { margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        .board-wrapper {
            width: 100%;
            max-height: 70vh;
            overflow: auto;
            border: 2px solid #333;
            background: #ccc;
            margin-bottom: 20px;
            -webkit-overflow-scrolling: touch;
        }
        
        #board { display: grid; margin: 0 auto; gap: 0; }
        
        .cell { 
            position: relative; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; box-sizing: border-box; border: 0.1px solid rgba(0,0,0,0.05);
            transition: background-color 0.2s;
        }
        .white { background-color: #ffffff; }
        .black { background-color: #d1d1d1; }
        
        /* 顏色優先權：紅格 > 黃色對角線 > 原色 */
        .diagonal-highlight { background-color: #fff9c4 !important; } /* 淡黃色 */
        .red { background-color: #ff4d4d !important; color: white !important; font-weight: bold; z-index: 2; }
        
        .coord-text { pointer-events: none; user-select: none; z-index: 1; }
        
        #f-display { font-weight: bold; color: #d32f2f; font-size: 2.5rem; }
        input { width: 70px; padding: 8px; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; text-align: center; }
        button { padding: 8px 20px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>專題棋盤 (對角線提示)</h2>
    <div class="controls">
        <label>邊長 n:</label>
        <input type="number" id="nInput" value="15" min="2" max="100">
        <button onclick="createBoard()">重新生成</button>
    </div>
    
    <div class="board-wrapper">
        <div id="board"></div>
    </div>

    <div class="info">
        <div>最大無紅格正方形邊長 f = <span id="f-display">0</span></div>
        <p style="font-size: 0.8rem; color: #888;">黃色區域：受紅格影響的對角線 (斜率 ±1)</p>
    </div>
</div>

<script>
    let redSet = new Set(); 

    function createBoard() {
        const nInput = document.getElementById('nInput');
        let n = parseInt(nInput.value) || 15;
        
        if (n > 60) {
            if (!confirm("n 較大時計算對角線可能稍慢，確定繼續？")) return;
        }

        const board = document.getElementById('board');
        board.innerHTML = '';
        redSet.clear();
        
        let cellSize = n > 30 ? 25 : 35;
        board.style.gridTemplateColumns = `repeat(${n}, ${cellSize}px)`;
        board.style.gridTemplateRows = `repeat(${n}, ${cellSize}px)`;

        for (let r = 0; r < n; r++) {
            for (let c = 0; c < n; c++) {
                const cell = document.createElement('div');
                cell.style.width = `${cellSize}px`;
                cell.style.height = `${cellSize}px`;
                cell.className = `cell ${(r + c) % 2 === 0 ? 'white' : 'black'}`;
                cell.id = `cell-${r}-${c}`;
                
                if (cellSize >= 25) {
                    const span = document.createElement('span');
                    span.className = 'coord-text';
                    span.style.fontSize = '9px';
                    span.style.opacity = '0.4';
                    span.innerText = `${r},${c}`;
                    cell.appendChild(span);
                }
                
                cell.onclick = () => handleToggle(r, c, n);
                cell.oncontextmenu = (e) => e.preventDefault();
                board.appendChild(cell);
            }
        }
        updateVisuals(n);
    }

    function handleToggle(r, c, n) {
        const key = `${r}-${c}`;
        if (redSet.has(key)) {
            redSet.delete(key);
        } else {
            // 檢查衝突
            for (let item of redSet) {
                const [r2, c2] = item.split('-').map(Number);
                if (Math.abs(r - r2) === Math.abs(c - c2)) {
                    alert(`❌ 衝突：該位置已在紅格 (${r2}, ${c2}) 的對角線上`);
                    return;
                }
            }
            redSet.add(key);
        }
        updateVisuals(n);
    }

    function updateVisuals(n) {
        // 先重設所有格子的樣式
        for (let r = 0; r < n; r++) {
            for (let c = 0; c < n; c++) {
                const el = document.getElementById(`cell-${r}-${c}`);
                el.classList.remove('red', 'diagonal-highlight');
            }
        }

        // 重新繪製對角線與紅格
        redSet.forEach(key => {
            const [rr, cc] = key.split('-').map(Number);
            
            // 標示對角線
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    if (Math.abs(i - rr) === Math.abs(j - cc)) {
                        document.getElementById(`cell-${i}-${j}`).classList.add('diagonal-highlight');
                    }
                }
            }
            // 標示紅格本人
            document.getElementById(`cell-${rr}-${cc}`).classList.add('red');
        });

        calculateF(n);
    }

    function calculateF(n) {
        let dp = Array.from({ length: n }, () => Array(n).fill(0));
        let maxF = 0;
        for (let r = 0; r < n; r++) {
            for (let c = 0; c < n; c++) {
                if (!redSet.has(`${r}-${c}`)) {
                    if (r === 0 || c === 0) {
                        dp[r][c] = 1;
                    } else {
                        dp[r][c] = Math.min(dp[r-1][c], dp[r][c-1], dp[r-1][c-1]) + 1;
                    }
                    maxF = Math.max(maxF, dp[r][c]);
                } else {
                    dp[r][c] = 0;
                }
            }
        }
        document.getElementById('f-display').innerText = maxF;
    }

    window.onload = createBoard;
</script>

</body>
</html>
