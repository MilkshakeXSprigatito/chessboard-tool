<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>專題棋盤 - 高階大尺寸版</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; 
            background: #f0f2f5; margin: 0; padding: 20px 10px;
            touch-action: manipulation;
        }
        .container { 
            background: white; padding: 20px; border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center;
            width: 100%; max-width: 900px; box-sizing: border-box;
        }
        .controls { margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        /* 核心修正：加入捲軸容器 */
        .board-wrapper {
            width: 100%;
            max-height: 70vh; /* 限制最大高度 */
            overflow: auto;   /* 開啟捲軸 */
            border: 2px solid #333;
            background: #ccc;
            margin-bottom: 20px;
            -webkit-overflow-scrolling: touch; /* 讓平板滑動更順暢 */
        }
        
        #board { display: grid; margin: 0 auto; gap: 0; }
        
        .cell { 
            position: relative; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; box-sizing: border-box; border: 0.1px solid rgba(0,0,0,0.05);
            -webkit-tap-highlight-color: transparent;
        }
        .white { background-color: #ffffff; }
        .black { background-color: #d1d1d1; }
        .red { background-color: #ff4d4d !important; color: white !important; font-weight: bold; }
        
        .coord-text { pointer-events: none; user-select: none; }
        
        #f-display { font-weight: bold; color: #d32f2f; font-size: 2.5rem; }
        input { width: 70px; padding: 8px; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; text-align: center; }
        button { padding: 8px 20px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>專題大棋盤工具</h2>
    <div class="controls">
        <label>邊長 n (建議 ≤ 50):</label>
        <input type="number" id="nInput" value="20" min="2" max="100">
        <button onclick="createBoard()">重新生成</button>
    </div>
    
    <div class="board-wrapper">
        <div id="board"></div>
    </div>

    <div class="info">
        <div>最大無紅格正方形邊長 f = <span id="f-display">0</span></div>
        <p style="font-size: 0.8rem; color: #888;">提示：棋盤過大時可滑動捲軸。點擊切換紅格。</p>
    </div>
</div>

<script>
    let redSet = new Set(); 

    function createBoard() {
        const nInput = document.getElementById('nInput');
        let n = parseInt(nInput.value) || 20;
        
        // 效能防護：若 n 太大提醒使用者
        if (n > 60) {
            if (!confirm("n 超過 60 可能會導致低階裝置操作緩慢，確定要繼續嗎？")) return;
        }

        const board = document.getElementById('board');
        board.innerHTML = '';
        redSet.clear();
        
        // 設定固定格子大小，確保大尺寸下不會縮小到無法點擊
        // 電腦版 40px, 大尺寸 n 時縮小到 30px
        let cellSize = n > 30 ? 25 : 35;
        
        board.style.gridTemplateColumns = `repeat(${n}, ${cellSize}px)`;
        board.style.gridTemplateRows = `repeat(${n}, ${cellSize}px)`;

        for (let r = 0; r < n; r++) {
            for (let c = 0; c < n; c++) {
                const cell = document.createElement('div');
                cell.style.width = `${cellSize}px`;
                cell.style.height = `${cellSize}px`;
                cell.className = `cell ${(r + c) % 2 === 0 ? 'white' : 'black'}`;
                cell.id = `cell-${r}-${c}`;
                
                // 只有在格子夠大時才顯示座標文字
                if (cellSize >= 25) {
                    const span = document.createElement('span');
                    span.className = 'coord-text';
                    span.style.fontSize = n > 25 ? '8px' : '10px';
                    span.style.opacity = n > 40 ? '0.3' : '0.6';
                    span.innerText = `${r},${c}`;
                    cell.appendChild(span);
                }
                
                cell.onclick = () => handleToggle(r, c, n);
                cell.oncontextmenu = (e) => e.preventDefault();
                board.appendChild(cell);
            }
        }
        updateF(n);
    }

    function handleToggle(r, c, n) {
        const key = `${r}-${c}`;
        const el = document.getElementById(key ? `cell-${r}-${c}` : '');
        if (!el) return;

        if (redSet.has(key)) {
            redSet.delete(key);
            el.classList.remove('red');
        } else {
            for (let item of redSet) {
                const [r2, c2] = item.split('-').map(Number);
                if (Math.abs(r - r2) === Math.abs(c - c2)) {
                    alert(`❌ 斜率衝突：(${r}, ${c}) 與 (${r2}, ${c2})`);
                    return;
                }
            }
            redSet.add(key);
            el.classList.add('red');
        }
        updateF(n);
    }

    function updateF(n) {
        let dp = Array.from({ length: n }, () => Array(n).fill(0));
        let maxF = 0;
        for (let r = 0; r < n; r++) {
            for (let c = 0; c < n; c++) {
                if (!redSet.has(`${r}-${c}`)) {
                    if (r === 0 || c === 0) {
                        dp[r][c] = 1;
                    } else {
                        dp[r][c] = Math.min(dp[r-1][c], dp[r][c-1], dp[r-1][c-1]) + 1;
                    }
                    maxF = Math.max(maxF, dp[r][c]);
                } else {
                    dp[r][c] = 0;
                }
            }
        }
        document.getElementById('f-display').innerText = maxF;
    }

    window.onload = createBoard;
</script>

</body>
</html>
