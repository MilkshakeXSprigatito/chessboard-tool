<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>專題棋盤 - 平板優化版</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: #f0f2f5; 
            margin: 0;
            padding: 20px 10px;
            touch-action: manipulation; /* 優化觸控反應 */
        }
        .container { 
            background: white; 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            text-align: center;
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }
        h2 { margin: 0 0 15px 0; color: #333; font-size: 1.5rem; }
        
        /* 控制區樣式 */
        .controls { margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; align-items: center; }
        input { width: 60px; padding: 8px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; text-align: center; }
        button { 
            padding: 8px 20px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
        }
        button:active { background: #0056b3; transform: scale(0.98); }

        /* 棋盤區域 */
        #board { 
            display: grid; 
            border: 2px solid #333; 
            margin: 0 auto 20px auto; 
            background: #ccc; 
            user-select: none;
            -webkit-user-select: none;
            gap: 0;
        }
        .cell { 
            position: relative;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer;
            box-sizing: border-box;
            font-size: 10px; /* 座標文字大小 */
            color: rgba(0,0,0,0.25);
            -webkit-tap-highlight-color: transparent; /* 移除手機點擊藍框 */
        }
        .white { background-color: #ffffff; }
        .black { background-color: #d1d1d1; }
        .red { background-color: #ff4d4d !important; color: white !important; font-weight: bold; border: 1px solid #cc0000; }
        
        /* 資訊區 */
        .info { border-top: 1px solid #eee; padding-top: 15px; }
        #f-display { font-weight: bold; color: #d32f2f; font-size: 2.5rem; line-height: 1.2; }
        .hint { font-size: 0.85rem; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>專題棋盤討論工具</h2>
    <div class="controls">
        <label>邊長 n:</label>
        <input type="number" id="nInput" value="8" min="2" max="25">
        <button onclick="createBoard()">重新生成</button>
    </div>
    
    <div id="board"></div>

    <div class="info">
        <div>最大無紅格正方形邊長</div>
        <div>f = <span id="f-display">0</span></div>
        <p class="hint">點擊格子切換顏色 | 顯示座標 (r, c)</p>
    </div>
</div>

<script>
    let redSet = new Set(); 

    function createBoard() {
        const nInput = document.getElementById('nInput');
        let n = parseInt(nInput.value);
        
        // 防呆：限制 n 的範圍 (2~100)
        if (!n || n < 2) n = 2;
        if (n > 100) n = 100;
        nInput.value = n;

        const board = document.getElementById('board');
        board.innerHTML = '';
        redSet.clear();
        
        // 1. 智慧計算格子大小：確保棋盤塞得進螢幕寬度
        const containerWidth = document.querySelector('.container').clientWidth - 40; // 減去 padding
        const cellSize = Math.floor(containerWidth / n);
        
        // 2. 設定棋盤網格
        board.style.gridTemplateColumns = `repeat(${n}, ${cellSize}px)`;
        // 關鍵修正：強制設定高度，避免棋盤扁掉
        board.style.gridTemplateRows = `repeat(${n}, ${cellSize}px)`; 

        for (let r = 0; r < n; r++) {
            for (let c = 0; c < n; c++) {
                const cell = document.createElement('div');
                cell.style.width = `${cellSize}px`;
                cell.style.height = `${cellSize}px`;
                cell.className = `cell ${(r + c) % 2 === 0 ? 'white' : 'black'}`;
                cell.id = `cell-${r}-${c}`;
                cell.innerText = `${r},${c}`; // 顯示 0-base 座標
                
                // 3. 統一用 click 事件，支援手機與滑鼠
                cell.onclick = () => handleToggle(r, c, n);
                
                // 防止右鍵選單干擾
                cell.oncontextmenu = (e) => e.preventDefault();
                
                board.appendChild(cell);
            }
        }
        updateF(n);
    }

    function handleToggle(r, c, n) {
        const key = `${r}-${c}`;
        const el = document.getElementById(`cell-${r}-${c}`);

        if (redSet.has(key)) {
            // 如果已經是紅色，就取消
            redSet.delete(key);
            el.classList.remove('red');
        } else {
            // 如果是白色，先檢查斜率衝突
            for (let item of redSet) {
                const [r2, c2] = item.split('-').map(Number);
                if (Math.abs(r - r2) === Math.abs(c - c2)) {
                    alert(`❌ 位置衝突！\n無法放置在 (${r}, ${c})\n因為與 (${r2}, ${c2}) 在同一對角線上。`);
                    return;
                }
            }
            // 通過檢查，變紅色
            redSet.add(key);
            el.classList.add('red');
        }
        updateF(n);
    }

    function updateF(n) {
        let dp = Array.from({ length: n }, () => Array(n).fill(0));
        let maxF = 0;
        for (let r = 0; r < n; r++) {
            for (let c = 0; c < n; c++) {
                if (!redSet.has(`${r}-${c}`)) {
                    if (r === 0 || c === 0) {
                        dp[r][c] = 1;
                    } else {
                        dp[r][c] = Math.min(dp[r-1][c], dp[r][c-1], dp[r-1][c-1]) + 1;
                    }
                    maxF = Math.max(maxF, dp[r][c]);
                } else {
                    dp[r][c] = 0;
                }
            }
        }
        document.getElementById('f-display').innerText = maxF;
    }

    // 確保畫面載入後自動產生棋盤
    window.onload = createBoard;
    
    // 當旋轉螢幕或改變視窗大小時，重新調整格子大小
    let resizeTimer;
    window.onresize = () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(createBoard, 100);
    };
</script>

</body>
</html>
